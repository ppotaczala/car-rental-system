name: AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD > diff.txt

      - name: Install deps
        run: pip install requests

      - name: Run AI review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python - <<EOF
          import requests
          import os

          with open("diff.txt", "r") as f:
              diff = f.read()[:12000]

          response = requests.post(
              "https://api.openai.com/v1/chat/completions",
              headers={
                  "Authorization": f"Bearer {os.environ['OPENAI_API_KEY']}",
                  "Content-Type": "application/json"
              },
              json={
                  "model": "gpt-4o-mini",
                  "messages": [
                      {"role": "system", "content": "You are a senior code reviewer."},
                      {"role": "user", "content": f"Review this code diff:\n\n{diff}"}
                  ]
              }
          )

          if response.status_code != 200:
              with open("ai-review.md", "w") as f:
                  f.write("⚠️ AI review failed: " + response.text)
          else:
              content = response.json()["choices"][0]["message"]["content"]
              with open("ai-review.md", "w") as f:
                  f.write(content)
          EOF

      - name: Comment on PR (create or update)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('ai-review.md', 'utf8');

            const marker = "## 🤖 AI Review";
            const newBody = `${marker}\n\n${body}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: newBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: newBody
              });
            }